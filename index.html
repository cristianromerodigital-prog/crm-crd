<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM â€” Cristian Romero Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c9a84c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CRM CRD"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f8;--surface:#ffffff;--surface2:#f8f8f8;--border:#e0e0e0;
  --text:#111111;--muted:#888888;--subtle:#aaaaaa;
  --accent:#c9a84c;--accent-h:#a8872e;
  --header-bg:#ffffff;--header-text:#111111;
  --green:#2e8b57;--yellow:#c8960a;--red:#c0392b;--purple:#7b5ea7;--cyan:#1a7a8a;
  --shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.10);
}
body{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
button{cursor:pointer;border:none;font-family:inherit}

/* â”€â”€â”€ LOGIN â”€â”€â”€ */
#loginScreen{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#111111;background-image:radial-gradient(ellipse at 50% 0%, #2a2010 0%, #111111 60%)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:360px;text-align:center;box-shadow:var(--shadow-lg)}
.login-logo{font-size:13px;font-weight:800;letter-spacing:3px;color:var(--accent);margin-bottom:2px}
.login-sub{font-size:10px;letter-spacing:4px;color:var(--subtle);text-transform:uppercase;margin-bottom:28px}
.login-divider{width:40px;height:2px;background:var(--accent);margin:0 auto 28px;border-radius:1px}
.login-box h1{font-size:18px;margin-bottom:4px;color:var(--text);font-weight:700}
.login-box p{color:var(--muted);font-size:12px;margin-bottom:24px}
.login-box input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;margin-bottom:10px;outline:none;font-family:inherit}
.login-box input:focus{border-color:var(--accent);background:#fff}
.login-box .btn-login{width:100%;padding:12px;background:var(--header-bg);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.5px;transition:.2s;border:1px solid var(--accent)}
.login-box .btn-login:hover{background:var(--accent);color:var(--header-bg)}
.login-error{color:var(--red);font-size:12px;margin-top:10px}
.login-version{font-size:10px;color:var(--subtle);margin-top:20px;letter-spacing:1px}

/* â”€â”€â”€ APP LAYOUT â”€â”€â”€ */
#app{display:none;flex-direction:column;position:fixed;top:0;left:0;right:0;width:100%;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;background:var(--header-bg);border-bottom:2px solid var(--accent);flex-shrink:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:20px;letter-spacing:3px;text-transform:uppercase;color:var(--text);margin-right:8px}
.logo span{color:var(--accent)}
.salon-tabs{display:flex;gap:4px;flex:1}
.salon-tab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;background:transparent;color:var(--muted);transition:.15s;letter-spacing:.5px;text-transform:uppercase}
.salon-tab.active{background:var(--accent);color:#ffffff}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.user-name{font-size:12px;color:#7a6a48;letter-spacing:.3px}
.btn-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);color:#9a8a5a;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.btn-icon:hover{background:rgba(201,168,76,.2);color:var(--accent)}

/* â”€â”€â”€ KANBAN â”€â”€â”€ */
#kanban{display:flex;gap:12px;padding:16px;overflow-x:auto;flex:1;align-items:flex-start;background:var(--bg)}
#kanban::-webkit-scrollbar{height:6px}
#kanban::-webkit-scrollbar-track{background:transparent}
#kanban::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.stage-col{min-width:264px;max-width:264px;background:var(--surface);border-radius:12px;display:flex;flex-direction:column;max-height:100%;box-shadow:var(--shadow);border:1px solid var(--border)}
.stage-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);border-radius:12px 12px 0 0}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stage-name{font-size:11px;font-weight:700;flex:1;line-height:1.3;color:var(--text);letter-spacing:.3px;text-transform:uppercase}
.stage-count{font-size:11px;background:var(--accent);color:#ffffff;border-radius:20px;padding:2px 8px;font-weight:700}
.stage-cards{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;flex:1}
.stage-cards::-webkit-scrollbar{width:4px}
.stage-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* â”€â”€â”€ LEAD CARD â”€â”€â”€ */
.lead-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.lead-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(201,168,76,.15);transform:translateY(-1px)}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.source-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700}
.source-wa{background:#25d366;color:#fff}
.source-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.source-fb{background:#1877f2;color:#fff}
.card-name{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.card-event{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.card-event span{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-weight:600}
.card-preview{font-size:11px;color:var(--subtle);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-time{font-size:10px;color:var(--subtle)}
.card-assigned{width:22px;height:22px;border-radius:50%;background:var(--header-bg);color:var(--accent);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1px solid var(--accent)}
.add-lead-card{border:1px dashed var(--border);background:transparent;color:var(--subtle);font-size:12px;padding:10px;border-radius:8px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.add-lead-card:hover{border-color:var(--accent);color:var(--accent)}

/* â”€â”€â”€ LEAD PANEL â”€â”€â”€ */
#leadPanel{position:fixed;right:0;top:0;bottom:0;width:480px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:100;box-shadow:-8px 0 32px rgba(0,0,0,.12);overflow:hidden}
#leadPanel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--header-bg)}
.panel-source{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.panel-name{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--header-text)}
.panel-stage-sel{font-size:10px;padding:4px 10px;border-radius:20px;color:var(--header-bg);font-weight:700;cursor:pointer;border:none;font-family:inherit;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.btn-close-panel{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);color:#9a8a5a;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.btn-close-panel:hover{background:rgba(201,168,76,.2);color:var(--accent)}
.panel-tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--surface2)}
.p-tab{flex:1;padding:10px 6px;font-size:11px;font-weight:700;color:var(--muted);background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;letter-spacing:.2px}
.p-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel-body{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--surface);min-height:0}

/* â”€â”€â”€ CHAT TAB â”€â”€â”€ */
#tabChat{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.msg-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg);min-height:0}
.msg-list::-webkit-scrollbar{width:4px}
.msg-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:2px}
.msg.out{align-self:flex-end;align-items:flex-end}
.msg.in{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.in .msg-bubble{background:#fff;border:1px solid var(--border);border-radius:14px 14px 14px 2px;color:var(--text)}
.msg.out .msg-bubble{background:var(--header-bg);color:var(--accent);border-radius:14px 14px 2px 14px;border:1px solid var(--accent)}
.msg-meta{font-size:10px;color:var(--subtle)}
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#fff}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:16px;font-family:inherit;resize:none;max-height:120px;outline:none;line-height:1.4}
.chat-input:focus{border-color:var(--accent)}
.btn-send{width:36px;height:36px;background:var(--header-bg);color:var(--accent);border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;border:1px solid var(--accent)}
.btn-send:hover{background:var(--accent);color:var(--header-bg)}
.chat-note{font-size:11px;color:var(--subtle);padding:8px 16px 0;text-align:center;background:var(--bg)}

/* â”€â”€â”€ INFO TAB â”€â”€â”€ */
#tabInfo{display:none;padding:16px;overflow-y:auto;flex:1;background:var(--surface)}
#tabInfo::-webkit-scrollbar{width:4px}
#tabInfo::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.info-row{margin-bottom:14px}
.info-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.info-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.info-input:focus{border-color:var(--accent);background:#fff}
select.info-input option{background:#fff}
.info-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-save-info{width:100%;padding:10px;background:var(--header-bg);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;margin-top:8px;transition:.2s;border:1px solid var(--accent)}
.btn-save-info:hover{background:var(--accent);color:var(--header-bg)}
.save-ok{font-size:12px;color:var(--green);text-align:center;margin-top:6px;opacity:0;transition:.3s}

/* â”€â”€â”€ TASKS TAB â”€â”€â”€ */
#tabTasks{display:none;padding:16px;overflow-y:auto;flex:1;flex-direction:column;background:var(--surface)}
.task-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.task-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;font-size:11px}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-content{flex:1}
.task-text{font-size:13px;margin-bottom:2px;color:var(--text)}
.task-date{font-size:11px;color:var(--muted)}
.task-del{color:var(--subtle);font-size:14px;cursor:pointer;padding:2px 4px;transition:.15s}
.task-del:hover{color:var(--red)}
.add-task-form{border-top:1px solid var(--border);padding-top:16px}
.add-task-form input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:8px}
.add-task-form input:focus{border-color:var(--accent);background:#fff}
.add-task-row{display:grid;grid-template-columns:1fr auto;gap:8px}
.btn-add-task{padding:8px 16px;background:var(--header-bg);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;transition:.2s;border:1px solid var(--accent)}
.btn-add-task:hover{background:var(--accent);color:var(--header-bg)}

/* â”€â”€â”€ TEMPLATES TAB â”€â”€â”€ */
#tabTemplates{display:none;padding:12px;overflow-y:auto;flex:1;background:var(--surface)}
#tabTemplates::-webkit-scrollbar{width:4px}
#tabTemplates::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tpl-category{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;padding-left:2px}
.tpl-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.2s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tpl-card:hover{border-color:var(--accent);box-shadow:0 3px 12px rgba(201,168,76,.12)}
.tpl-title{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--text)}
.tpl-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:40px}
.tpl-copy{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--subtle);transition:.15s}
.tpl-card:hover .tpl-copy{color:var(--accent)}
.tpl-copied{color:var(--green)!important}

/* â”€â”€â”€ ADD LEAD MODAL â”€â”€â”€ */
.modal-overlay{position:fixed;inset:0;background:rgba(13,11,6,.7);z-index:200;display:flex;align-items:center;justify-content:center;display:none;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-box h2{font-size:16px;margin-bottom:20px;color:var(--text);font-weight:700;letter-spacing:.3px}
.modal-box .info-row{margin-bottom:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;background:var(--surface2);color:var(--muted);border-radius:8px;font-size:13px;font-weight:600;transition:.15s;border:1px solid var(--border)}
.btn-cancel:hover{background:var(--border)}
.btn-confirm{flex:1;padding:10px;background:var(--header-bg);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;transition:.2s;border:1px solid var(--accent)}
.btn-confirm:hover{background:var(--accent);color:var(--header-bg)}

/* â”€â”€â”€ FAB â”€â”€â”€ */
#fabAdd{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--header-bg);color:var(--accent);font-size:26px;box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 0 1px var(--accent);display:flex;align-items:center;justify-content:center;z-index:50;transition:.2s}
#fabAdd:hover{background:var(--accent);color:var(--header-bg);transform:scale(1.08)}

/* â”€â”€â”€ ADMIN MODAL â”€â”€â”€ */
#adminModal{position:fixed;inset:0;background:rgba(13,11,6,.75);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(4px)}
#adminModal.open{display:flex}
.admin-box{background:#fff;border:1px solid var(--border);border-radius:16px;width:600px;max-width:100%;margin:auto;box-shadow:var(--shadow-lg)}
.admin-head{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border);background:var(--header-bg);border-radius:16px 16px 0 0}
.admin-head h2{font-size:15px;flex:1;color:var(--accent);font-weight:700;letter-spacing:.5px}
.admin-tabs{display:flex;border-bottom:2px solid var(--border);background:var(--surface2)}
.admin-tab{flex:1;padding:11px;font-size:11px;font-weight:700;color:var(--muted);background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;letter-spacing:.3px}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.admin-body{padding:20px;background:#fff;border-radius:0 0 16px 16px}
/* Stages */
.stage-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.stage-row-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent}
.stage-row-name{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;font-family:inherit;outline:none;min-width:0}
.stage-row-name:focus{border-bottom:1px solid var(--accent)}
.stage-row-color{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;padding:2px;flex-shrink:0}
.stage-move{background:transparent;color:var(--subtle);font-size:16px;padding:2px 4px;transition:.15s;flex-shrink:0}
.stage-move:hover{color:var(--text)}
.stage-del{background:transparent;color:var(--subtle);font-size:14px;padding:2px 6px;transition:.15s;flex-shrink:0}
.stage-del:hover{color:var(--red)}
.btn-add-stage{width:100%;padding:9px;border:1px dashed var(--border);background:transparent;color:var(--muted);border-radius:8px;font-size:13px;margin-top:8px;transition:.15s}
.btn-add-stage:hover{border-color:var(--accent);color:var(--accent)}
.admin-save{width:100%;padding:10px;background:var(--header-bg);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;margin-top:16px;transition:.2s;border:1px solid var(--accent)}
.admin-save:hover{background:var(--accent);color:var(--header-bg)}
/* Templates admin */
.tpl-admin-cat{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:14px}
.tpl-admin-cat input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-weight:700;font-family:inherit;outline:none}
.tpl-admin-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.tpl-admin-row input,.tpl-admin-row textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.tpl-admin-row input{width:140px;flex-shrink:0}
.tpl-admin-row textarea{flex:1;resize:vertical;min-height:50px}
/* Users admin */
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-info-col{flex:1}
.user-name-r{font-size:13px;font-weight:600}
.user-email-r{font-size:11px;color:var(--muted)}

const LS_STAGES    = 'crm_stages';
const LS_TEMPLATES = 'crm_templates';
const LS_USERS     = 'crm_users';

function loadStages() {
  try {
    const saved = localStorage.getItem(LS_STAGES);
    if (saved) return JSON.parse(saved);
  } catch(_) {}
  return null;
}
function saveStages(stages) { localStorage.setItem(LS_STAGES, JSON.stringify(stages)); }

function loadTemplates() {
  try {
    const saved = localStorage.getItem(LS_TEMPLATES);
    if (saved) return JSON.parse(saved);
  } catch(_) {}
  return null;
}
function saveTemplates(tpls) { localStorage.setItem(LS_TEMPLATES, JSON.stringify(tpls)); }

function loadUsers() {
  try {
    const saved = localStorage.getItem(LS_USERS);
    if (saved) return JSON.parse(saved);
  } catch(_) {}
  return null;
}
function saveUsers(users) { localStorage.setItem(LS_USERS, JSON.stringify(users)); }

function initFirebase() {
  const isDemo = FIREBASE_CONFIG.apiKey === 'TU_API_KEY';
  if (isDemo) {
    console.info('Modo demo activo â€” sin base de datos');
    initDemoMode();
    initSimulator();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('fabAdd').style.display = 'flex';
    document.getElementById('headerUser').textContent = 'Cristian';
    checkAdminAccess('Cristian');
    startApp();
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db   = firebase.firestore();
    auth = firebase.auth();
    auth.onAuthStateChanged(user => {
      if (user) {
        resetZoom();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('fabAdd').style.display = 'flex';
        document.getElementById('headerUser').textContent = user.email.split('@')[0];
        startApp();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        document.getElementById('fabAdd').style.display = 'none';
      }
    });
  } catch(e) {
    console.warn('Firebase error. Modo demo activo.');
    initDemoMode();
    initSimulator();
  }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';

  // Demo mode: validar contra usuarios hardcodeados
  if (window._demoMode) {
    const user = DEMO_USERS.find(u => u.email === email && u.pass === pass);
    if (!user) { err.textContent = 'Email o contraseÃ±a incorrectos'; return; }
    resetZoom();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('fabAdd').style.display = 'flex';
    window.scrollTo(0, 0);
    document.getElementById('headerUser').textContent = user.name;
    checkAdminAccess(user.name);
    startApp();
    return;
  }

  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    err.textContent = 'Email o contraseÃ±a incorrectos';
  }
}

async function doLogout() {
  if (unsubLeads) unsubLeads();
  await auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('fabAdd').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

  const savedStages = loadStages();
  if (savedStages) { STAGES.length = 0; savedStages.forEach(s => STAGES.push(s)); }
  const savedTpls = loadTemplates();
  if (savedTpls) { TEMPLATES.length = 0; savedTpls.forEach(t => TEMPLATES.push(t)); }

  renderKanban();
  subscribeLeads();
  buildStageSelect('newStage');
  buildTemplates();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function relTime(date) {
  const diff = (Date.now() - date.getTime()) / 1000;
  if (diff < 60)    return 'ahora';
  if (diff < 3600)  return Math.floor(diff/60) + 'm';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'd';
}

// Ajusta app y panel al visual viewport real (maneja teclado en iOS/Android)
function setAppHeight() {
  const vv  = window.visualViewport;
  const h   = vv ? vv.height : window.innerHeight;
  const top = vv ? vv.offsetTop : 0;
  document.getElementById('app').style.height = h + 'px';
  document.getElementById('loginScreen').style.height = h + 'px';
  const panel = document.getElementById('leadPanel');
  if (panel) {
    panel.style.top    = top + 'px';
    panel.style.height = h + 'px';
    panel.style.bottom = 'auto';
  }
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}

  const vp = document.querySelector('meta[name="viewport"]');

function extractPhone(text) {
  const m = text.match(/(\+?[\d][\d\s\-\(\)]{6,})/);
  if (!m) return null;
  const digits = m[1].replace(/\D/g, '');
  return digits.length >= 8 ? digits : null;
}

function parseEventData(text) {
  const lower = text.toLowerCase();
  const r = { hasData:false, type:null, guests:null, year:null, month:null };

  if (/boda|casamiento/.test(lower))             { r.type = 'Boda';        r.hasData = true; }
  else if (/\b15\b|quince/.test(lower))           { r.type = '15 aÃ±os';     r.hasData = true; }
  else if (/corporativo|empresa|laboral/.test(lower)){ r.type = 'Corporativo'; r.hasData = true; }
  else if (/cumple/.test(lower))                  { r.type = 'CumpleaÃ±os';  r.hasData = true; }

  // Guests: primero buscar con contexto, luego sin fechas
  const ctxM = text.match(/(\d+)\s*(invitados?|personas?|pax)/i);
  if (ctxM) {
    r.guests = parseInt(ctxM[1]); r.hasData = true;
  } else {
    const clean = text
      .replace(/\d{1,2}\s+de\s+\w+/gi, '')
      .replace(/\d{1,2}[\/\-]\d{1,2}([\/\-]\d{2,4})?/g, '')
      .replace(/\b(202[5-9]|203\d)\b/g, '');
    const gm = clean.match(/\b(\d{2,3})\b/);
    if (gm) { r.guests = parseInt(gm[1]); r.hasData = true; }
  }

  const ym = text.match(/\b(202[5-9]|203\d)\b/);
  if (ym) { r.year = parseInt(ym[1]); r.hasData = true; }

  const months = ['enero','febrero','marzo','abril','mayo','junio','julio',
                  'agosto','septiembre','octubre','noviembre','diciembre'];
  for (const m of months) {
    if (lower.includes(m)) { r.month = m; r.hasData = true; break; }
  }

  return r;
}

function generateVisitSlots() {
  const dayNames = ['domingo','lunes','martes','miÃ©rcoles','jueves','viernes','sÃ¡bado'];
  const available = { 2:'17hs', 3:'17hs', 4:'16hs', 5:'17hs', 6:'11hs' };
  const slots = [];
  const d = new Date();
  d.setDate(d.getDate() + 1);
  while (slots.length < 3) {
    const dow = d.getDay();
    if (available[dow]) {
      const label = `${dayNames[dow]} ${d.getDate()}/${d.getMonth()+1} a las ${available[dow]}`;
      slots.push({ day: dayNames[dow], label });
    }
    d.setDate(d.getDate() + 1);
  }
  return slots;
}

function extractVisitDay(text) {
  const days = ['lunes','martes','miÃ©rcoles','miercoles','jueves','viernes','sÃ¡bado','sabado','domingo'];
  const lower = text.toLowerCase();
  for (const d of days) {
    if (lower.includes(d)) {
      const timeM = text.match(/\b(\d{1,2})[:\.](\d{2})\s*h[s]?|\b(\d{1,2})\s*h[s]?\b/i);
      const timeStr = timeM ? ` a las ${timeM[0]}` : '';
      return d + timeStr;
    }
  }
  const dateM = text.match(/\d{1,2}\s+de\s+\w+/i);
  return dateM ? dateM[0] : null;
}

function receiveSimMessage({ channel, contactId, contactName, text }) {
  if (!window._demoMode) return;

  // Find existing sim lead
  let lead = Object.values(leadsData).find(l => l._simContactId === contactId);

  if (!lead) {
    const isIg = channel === 'instagram' || channel === 'ig';
    const id = 'sim_' + Date.now();
    lead = {
      id, salon: currentSalon,
      name: contactName || contactId,
      phone: isIg ? '' : contactId,
      source: isIg ? 'instagram' : 'whatsapp',
      stage: isIg ? 'falta_whatsapp' : 'falta_datos',
      assignedTo: '', guests: 0, notes: '',
      lastMessage: text,
      updatedAt: { toDate: () => new Date() },
      _simContactId: contactId
    };
    leadsData[id] = lead;
    window._demoConvs[id] = [];
  } else {
    lead.lastMessage = text;
    lead.updatedAt = { toDate: () => new Date() };
  }

  window._demoConvs[lead.id].push({ dir:'in', text, time:'ahora' });
  renderCards();

  // If panel open for this lead, append bubble live
  if (currentLeadId === lead.id) {
    const msgList = document.getElementById('msgList');
    if (msgList) {
      const d = document.createElement('div');
      d.className = 'msg in';
      d.innerHTML = `<div class="msg-bubble">${esc(text)}</div><div class="msg-meta">ahora</div>`;
      msgList.appendChild(d);
      msgList.scrollTop = msgList.scrollHeight;
    }
  }

  // Toast notification
  const icon = (channel === 'ig' || channel === 'instagram') ? 'ðŸ“¸' : 'ðŸ“±';
  showSimToast(`${icon} ${contactName || contactId}: ${text.slice(0, 40)}${text.length > 40 ? 'â€¦' : ''}`);

  // Trigger bot
  botAutoReply(lead.id, text);
}

function extractPhone(text) {
  const m = text.match(/(\+?[\d][\d\s\-\(\)]{6,})/);

function parseEventData(text) {
  const lower = text.toLowerCase();
  const r = { hasData:false, type:null, guests:null, year:null, month:null };

  if (/boda|casamiento/.test(lower))             { r.type = 'Boda';        r.hasData = true; }
  else if (/\b15\b|quince/.test(lower))           { r.type = '15 aÃ±os';     r.hasData = true; }
  else if (/corporativo|empresa|laboral/.test(lower)){ r.type = 'Corporativo'; r.hasData = true; }
  else if (/cumple/.test(lower))                  { r.type = 'CumpleaÃ±os';  r.hasData = true; }

  // Guests: primero buscar con contexto, luego sin fechas
  const ctxM = text.match(/(\d+)\s*(invitados?|personas?|pax)/i);
  if (ctxM) {
    r.guests = parseInt(ctxM[1]); r.hasData = true;
  } else {
    const clean = text
      .replace(/\d{1,2}\s+de\s+\w+/gi, '')
      .replace(/\d{1,2}[\/\-]\d{1,2}([\/\-]\d{2,4})?/g, '')
      .replace(/\b(202[5-9]|203\d)\b/g, '');
    const gm = clean.match(/\b(\d{2,3})\b/);
    if (gm) { r.guests = parseInt(gm[1]); r.hasData = true; }
  }

  const ym = text.match(/\b(202[5-9]|203\d)\b/);
  if (ym) { r.year = parseInt(ym[1]); r.hasData = true; }

  const months = ['enero','febrero','marzo','abril','mayo','junio','julio',
                  'agosto','septiembre','octubre','noviembre','diciembre'];
  for (const m of months) {
    if (lower.includes(m)) { r.month = m; r.hasData = true; break; }
  }

  return r;
}

function generateVisitSlots() {
  const dayNames = ['domingo','lunes','martes','miÃ©rcoles','jueves','viernes','sÃ¡bado'];
  const available = { 2:'17hs', 3:'17hs', 4:'16hs', 5:'17hs', 6:'11hs' };
  const slots = [];
  const d = new Date();
  d.setDate(d.getDate() + 1);
  while (slots.length < 3) {
    const dow = d.getDay();
    if (available[dow]) {
      const label = `${dayNames[dow]} ${d.getDate()}/${d.getMonth()+1} a las ${available[dow]}`;
      slots.push({ day: dayNames[dow], label });
    }
    d.setDate(d.getDate() + 1);
  }
  return slots;
}

function extractVisitDay(text) {
  const days = ['lunes','martes','miÃ©rcoles','miercoles','jueves','viernes','sÃ¡bado','sabado','domingo'];
  const lower = text.toLowerCase();
  for (const d of days) {
    if (lower.includes(d)) {
      const timeM = text.match(/\b(\d{1,2})[:\.](\d{2})\s*h[s]?|\b(\d{1,2})\s*h[s]?\b/i);
      const timeStr = timeM ? ` a las ${timeM[0]}` : '';
      return d + timeStr;
    }
  }
  const dateM = text.match(/\d{1,2}\s+de\s+\w+/i);
  return dateM ? dateM[0] : null;
}

// SIMULATOR (BroadcastChannel)
// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
function initSimulator() {
  if (!('BroadcastChannel' in window)) return;
  window._simCh = new BroadcastChannel('crm_inbox');
  window._simCh.addEventListener('message', e => {
    if (e.data.type === 'sim_message') receiveSimMessage(e.data);
  });
}

function receiveSimMessage({ channel, contactId, contactName, text }) {
  if (!window._demoMode) return;

  // Find existing sim lead
  let lead = Object.values(leadsData).find(l => l._simContactId === contactId);

  if (!lead) {
    const isIg = channel === 'instagram' || channel === 'ig';
    const id = 'sim_' + Date.now();
    lead = {
      id, salon: currentSalon,
      name: contactName || contactId,
      phone: isIg ? '' : contactId,
      source: isIg ? 'instagram' : 'whatsapp',
      stage: isIg ? 'falta_whatsapp' : 'falta_datos',
      assignedTo: '', guests: 0, notes: '',
      lastMessage: text,
      updatedAt: { toDate: () => new Date() },
      _simContactId: contactId
    };
    leadsData[id] = lead;
    window._demoConvs[id] = [];
  } else {
    lead.lastMessage = text;
    lead.updatedAt = { toDate: () => new Date() };
  }

  window._demoConvs[lead.id].push({ dir:'in', text, time:'ahora' });
  renderCards();

  // If panel open for this lead, append bubble live
  if (currentLeadId === lead.id) {
    const msgList = document.getElementById('msgList');
    if (msgList) {
      const d = document.createElement('div');
      d.className = 'msg in';
      d.innerHTML = `<div class="msg-bubble">${esc(text)}</div><div class="msg-meta">ahora</div>`;
      msgList.appendChild(d);
      msgList.scrollTop = msgList.scrollHeight;
    }
  }

  // Toast notification
  const icon = (channel === 'ig' || channel === 'instagram') ? 'ðŸ“¸' : 'ðŸ“±';
  showSimToast(`${icon} ${contactName || contactId}: ${text.slice(0, 40)}${text.length > 40 ? 'â€¦' : ''}`);

  // Trigger bot
  botAutoReply(lead.id, text);
}

function showSimToast(msg) {
  const t = document.getElementById('simToast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
